<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">EquiHealth Plus Splash</title>
  <desc id="desc">Onboarding screen with bold dark gradient and accessibility-first messaging.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A2A3A"/>
      <stop offset="100%" stop-color="#103E2A"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0E9FBE"/>
      <stop offset="100%" stop-color="#6CCB4F"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <path d="M0,1420 C220,1260 420,1640 1080,1360 L1080,1920 L0,1920 Z" fill="#0C374A" opacity="0.75"/>
  <path d="M0,1600 C300,1420 560,1760 1080,1540 L1080,1920 L0,1920 Z" fill="#165A40" opacity="0.65"/>

  <text x="540" y="820" text-anchor="middle" font-size="148" font-family="Avenir, Poppins, sans-serif" font-weight="800" fill="url(#brand)">EquiHealth+</text>
  <text x="540" y="905" text-anchor="middle" font-size="48" font-family="Avenir, Poppins, sans-serif" fill="#C9EAF3">Clear care for every South Asian family</text>

  <rect x="260" y="1120" width="560" height="120" rx="60" fill="url(#brand)"/>
  <text x="540" y="1198" text-anchor="middle" font-size="46" font-family="Avenir, Poppins, sans-serif" font-weight="700" fill="#FFFFFF">Get Started</text>
</svg>