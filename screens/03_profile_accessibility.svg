<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Accessibility setup</title>
  <desc id="desc">Circular motif layout with dark base and bright accessibility controls.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#121E3A"/>
      <stop offset="100%" stop-color="#1B2F52"/>
    </linearGradient>
    <linearGradient id="pill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0E9FBE"/>
      <stop offset="100%" stop-color="#6CCB4F"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <circle cx="930" cy="210" r="220" fill="#26416F" opacity="0.5"/>
  <circle cx="150" cy="1640" r="260" fill="#1A4F4F" opacity="0.45"/>

  <text x="80" y="155" font-size="56" font-family="Avenir, Poppins, sans-serif" font-weight="700" fill="#F2F7FF">Accessibility Setup</text>

  <rect x="60" y="230" width="960" height="1480" rx="44" fill="#0E1830" opacity="0.9"/>
  <text x="110" y="330" font-size="34" font-family="Avenir, Poppins, sans-serif" fill="#DCE8FF">Preferred Language</text>
  <rect x="100" y="360" width="250" height="78" rx="39" fill="url(#pill)"/>
  <text x="170" y="410" font-size="30" font-family="Avenir, Poppins, sans-serif" fill="#FFFFFF">English</text>
  <rect x="370" y="360" width="180" height="78" rx="39" fill="#263A63"/>
  <text x="430" y="410" font-size="30" font-family="Avenir, Poppins, sans-serif" fill="#DCE8FF">Hindi</text>
  <rect x="570" y="360" width="220" height="78" rx="39" fill="#263A63"/>
  <text x="620" y="410" font-size="30" font-family="Avenir, Poppins, sans-serif" fill="#DCE8FF">Gujarati</text>

  <text x="110" y="530" font-size="34" font-family="Avenir, Poppins, sans-serif" fill="#DCE8FF">Text Size</text>
  <rect x="100" y="560" width="880" height="90" rx="18" fill="#23375E"/>
  <rect x="130" y="589" width="610" height="32" rx="16" fill="url(#pill)"/>
  <circle cx="740" cy="605" r="28" fill="#FFFFFF"/>
  <text x="820" y="614" font-size="30" font-family="Avenir, Poppins, sans-serif" fill="#E8F2FF">Large</text>

  <text x="110" y="750" font-size="34" font-family="Avenir, Poppins, sans-serif" fill="#DCE8FF">Notifications</text>
  <rect x="100" y="780" width="880" height="96" rx="20" fill="#23375E"/>
  <text x="140" y="842" font-size="34" font-family="Avenir, Poppins, sans-serif" fill="#E8F2FF">Medication and appointment alerts</text>
  <rect x="860" y="800" width="96" height="56" rx="28" fill="#6CCB4F"/>

  <text x="110" y="970" font-size="34" font-family="Avenir, Poppins, sans-serif" fill="#DCE8FF">Voice Assistant</text>
  <rect x="100" y="1000" width="880" height="96" rx="20" fill="#23375E"/>
  <text x="140" y="1062" font-size="34" font-family="Avenir, Poppins, sans-serif" fill="#E8F2FF">Read reminders out loud</text>
  <rect x="860" y="1020" width="96" height="56" rx="28" fill="#0E9FBE"/>

  <rect x="100" y="1460" width="880" height="110" rx="55" fill="url(#pill)"/>
  <text x="450" y="1532" font-size="42" font-family="Avenir, Poppins, sans-serif" font-weight="700" fill="#FFFFFF">Save</text>
</svg>