<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Home dashboard</title>
  <desc id="desc">Dark dashboard with glass style cards and bold quick-action modules.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#091A24"/>
      <stop offset="100%" stop-color="#103129"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0E9FBE"/>
      <stop offset="100%" stop-color="#6CCB4F"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <text x="70" y="130" font-size="56" font-family="Avenir, Poppins, sans-serif" font-weight="700" fill="#F4FBFF">Good morning, Tisya</text>
  <text x="70" y="185" font-size="32" font-family="Avenir, Poppins, sans-serif" fill="#AEC9D3">Monday, March 24</text>

  <rect x="60" y="240" width="960" height="220" rx="34" fill="url(#brand)"/>
  <text x="100" y="330" font-size="46" font-family="Avenir, Poppins, sans-serif" font-weight="700" fill="#FFFFFF">Next reminder: 8:00 AM</text>
  <text x="100" y="392" font-size="34" font-family="Avenir, Poppins, sans-serif" fill="#FFFFFF">Lisinopril 10mg and Walk 15 min</text>

  <rect x="60" y="500" width="460" height="210" rx="28" fill="#153242"/>
  <text x="95" y="570" font-size="34" font-family="Avenir, Poppins, sans-serif" fill="#DDEFF5">Medication</text>
  <text x="95" y="630" font-size="64" font-family="Avenir, Poppins, sans-serif" font-weight="700" fill="#0E9FBE">2/3</text>

  <rect x="560" y="500" width="460" height="210" rx="28" fill="#1A3F33"/>
  <text x="595" y="570" font-size="34" font-family="Avenir, Poppins, sans-serif" fill="#DFF7E9">Exercise</text>
  <text x="595" y="630" font-size="64" font-family="Avenir, Poppins, sans-serif" font-weight="700" fill="#6CCB4F">15</text>
  <text x="695" y="630" font-size="34" font-family="Avenir, Poppins, sans-serif" fill="#DFF7E9">mins</text>

  <text x="70" y="790" font-size="42" font-family="Avenir, Poppins, sans-serif" font-weight="700" fill="#F4FBFF">Quick Actions</text>

  <rect x="60" y="830" width="300" height="220" rx="26" fill="#1A4255"/>
  <text x="90" y="920" font-size="36" font-family="Avenir, Poppins, sans-serif" fill="#EAF8FF">Diet</text>
  <text x="90" y="970" font-size="28" font-family="Avenir, Poppins, sans-serif" fill="#B7D5DF">South Asian meals</text>

  <rect x="390" y="830" width="300" height="220" rx="26" fill="#205A44"/>
  <text x="420" y="920" font-size="36" font-family="Avenir, Poppins, sans-serif" fill="#ECFAF1">Alerts</text>
  <text x="420" y="970" font-size="28" font-family="Avenir, Poppins, sans-serif" fill="#C7E9D4">Meds and visits</text>

  <rect x="720" y="830" width="300" height="220" rx="26" fill="#223D66"/>
  <text x="750" y="920" font-size="36" font-family="Avenir, Poppins, sans-serif" fill="#EAF1FF">Info</text>
  <text x="750" y="970" font-size="28" font-family="Avenir, Poppins, sans-serif" fill="#C9D7F1">Simple summaries</text>

  <rect x="60" y="1090" width="960" height="250" rx="30" fill="#102632"/>
  <text x="95" y="1170" font-size="38" font-family="Avenir, Poppins, sans-serif" fill="#EAF8FF">Today</text>
  <text x="95" y="1225" font-size="30" font-family="Avenir, Poppins, sans-serif" fill="#B9D1DB">8:00 AM - Lisinopril</text>
  <text x="95" y="1270" font-size="30" font-family="Avenir, Poppins, sans-serif" fill="#B9D1DB">6:00 PM - Walk reminder</text>

  <rect x="60" y="1740" width="960" height="120" rx="34" fill="#132A36"/>
  <text x="130" y="1815" font-size="32" font-family="Avenir, Poppins, sans-serif" fill="#0E9FBE">Home</text>
  <text x="340" y="1815" font-size="32" font-family="Avenir, Poppins, sans-serif" fill="#8FB1BC">Diet</text>
  <text x="540" y="1815" font-size="32" font-family="Avenir, Poppins, sans-serif" fill="#8FB1BC">Alerts</text>
  <text x="745" y="1815" font-size="32" font-family="Avenir, Poppins, sans-serif" fill="#8FB1BC">Info</text>
  <text x="915" y="1815" font-size="32" font-family="Avenir, Poppins, sans-serif" fill="#8FB1BC">More</text>
</svg>