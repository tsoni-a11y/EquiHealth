<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Conditions and medications</title>
  <desc id="desc">Dark profile setup with section blocks for conditions medications and allergies.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1B1A35"/>
      <stop offset="100%" stop-color="#12283F"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0E9FBE"/>
      <stop offset="100%" stop-color="#6CCB4F"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <rect x="0" y="0" width="28" height="1920" fill="url(#brand)"/>

  <text x="70" y="145" font-size="54" font-family="Avenir, Poppins, sans-serif" font-weight="700" fill="#F3F5FF">Health Profile</text>
  <text x="70" y="198" font-size="30" font-family="Avenir, Poppins, sans-serif" fill="#BFC9E2">Conditions, medications, and allergies</text>

  <rect x="60" y="250" width="960" height="1460" rx="40" fill="#121D31"/>

  <text x="100" y="345" font-size="34" font-family="Avenir, Poppins, sans-serif" fill="#DCE5FF">Health Conditions</text>
  <rect x="95" y="380" width="890" height="95" rx="18" fill="#21314F"/>
  <text x="130" y="440" font-size="33" font-family="Avenir, Poppins, sans-serif" fill="#F0F4FF">Hypertension, Diabetes Type 2</text>
  <rect x="95" y="500" width="890" height="95" rx="18" fill="#21314F"/>
  <text x="130" y="560" font-size="33" font-family="Avenir, Poppins, sans-serif" fill="#F0F4FF">Hyperlipidemia</text>

  <text x="100" y="670" font-size="34" font-family="Avenir, Poppins, sans-serif" fill="#DCE5FF">Medications</text>
  <rect x="95" y="705" width="890" height="95" rx="18" fill="#1C3A50"/>
  <text x="130" y="765" font-size="33" font-family="Avenir, Poppins, sans-serif" fill="#EAF8FF">Lisinopril, Metformin, Rosuvastatin</text>
  <rect x="95" y="825" width="890" height="95" rx="18" fill="#1C3A50"/>
  <text x="130" y="885" font-size="33" font-family="Avenir, Poppins, sans-serif" fill="#EAF8FF">Aspirin (if prescribed)</text>

  <text x="100" y="995" font-size="34" font-family="Avenir, Poppins, sans-serif" fill="#DCE5FF">Medication Allergies</text>
  <rect x="95" y="1030" width="890" height="95" rx="18" fill="#20413A"/>
  <text x="130" y="1090" font-size="33" font-family="Avenir, Poppins, sans-serif" fill="#DDF6EC">Add allergy...</text>

  <text x="100" y="1200" font-size="34" font-family="Avenir, Poppins, sans-serif" fill="#DCE5FF">Non-medication Allergies</text>
  <rect x="95" y="1235" width="890" height="95" rx="18" fill="#20413A"/>
  <text x="130" y="1295" font-size="33" font-family="Avenir, Poppins, sans-serif" fill="#DDF6EC">Food, pollen, etc.</text>

  <rect x="95" y="1460" width="890" height="110" rx="55" fill="url(#brand)"/>
  <text x="418" y="1533" font-size="40" font-family="Avenir, Poppins, sans-serif" font-weight="700" fill="#FFFFFF">Save Profile</text>
</svg>