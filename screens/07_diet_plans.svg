<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Diet plans</title>
  <desc id="desc">Warm dark food board with culturally tailored meal cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D2418"/>
      <stop offset="100%" stop-color="#1F3323"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0E9FBE"/>
      <stop offset="100%" stop-color="#6CCB4F"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#bg)"/>
  <text x="70" y="145" font-size="54" font-family="Avenir, Poppins, sans-serif" font-weight="700" fill="#FFF4DE">Diet Plans</text>
  <text x="70" y="198" font-size="30" font-family="Avenir, Poppins, sans-serif" fill="#F2DDBA">For diabetes and blood pressure</text>
  <rect x="95" y="285" width="230" height="74" rx="37" fill="#0E9FBE"/>
  <text x="145" y="333" font-size="30" font-family="Avenir, Poppins, sans-serif" fill="#FFFFFF">Low Sodium</text>
  <rect x="345" y="285" width="210" height="74" rx="37" fill="#4E3C24"/>
  <text x="395" y="333" font-size="30" font-family="Avenir, Poppins, sans-serif" fill="#FFECCC">Low Sugar</text>
  <rect x="575" y="285" width="250" height="74" rx="37" fill="#2A4C35"/>
  <text x="640" y="333" font-size="30" font-family="Avenir, Poppins, sans-serif" fill="#E5FFE8">Vegetarian</text>
  <rect x="60" y="410" width="960" height="290" rx="26" fill="#3F2F1F"/>
  <text x="95" y="490" font-size="40" font-family="Avenir, Poppins, sans-serif" fill="#FFF0D4">Breakfast</text>
  <text x="95" y="550" font-size="32" font-family="Avenir, Poppins, sans-serif" fill="#F5DCB3">Oats upma and cucumber raita</text>
  <text x="95" y="603" font-size="28" font-family="Avenir, Poppins, sans-serif" fill="#E9C891">320 kcal - Low GI</text>
  <rect x="60" y="730" width="960" height="290" rx="26" fill="#214034"/>
  <text x="95" y="810" font-size="40" font-family="Avenir, Poppins, sans-serif" fill="#E9FFF0">Lunch</text>
  <text x="95" y="870" font-size="32" font-family="Avenir, Poppins, sans-serif" fill="#C7EED5">Brown rice, dal, bhindi</text>
  <text x="95" y="923" font-size="28" font-family="Avenir, Poppins, sans-serif" fill="#A8D8BB">450 kcal - Heart healthy</text>
  <rect x="60" y="1050" width="960" height="290" rx="26" fill="#253A4D"/>
  <text x="95" y="1130" font-size="40" font-family="Avenir, Poppins, sans-serif" fill="#EAF5FF">Dinner</text>
  <text x="95" y="1190" font-size="32" font-family="Avenir, Poppins, sans-serif" fill="#C4DBED">2 rotis, lauki sabzi, salad</text>
  <text x="95" y="1243" font-size="28" font-family="Avenir, Poppins, sans-serif" fill="#9BBBD1">380 kcal - Low sodium</text>
  <rect x="95" y="1490" width="890" height="112" rx="56" fill="url(#brand)"/>
  <text x="390" y="1562" font-size="40" font-family="Avenir, Poppins, sans-serif" font-weight="700" fill="#FFFFFF">Apply Plan</text>
</svg>
