<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Family caregiver access</title>
  <desc id="desc">Community-inspired dark teal layout for shared account permissions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0E2B32"/>
      <stop offset="100%" stop-color="#0F2442"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0E9FBE"/>
      <stop offset="100%" stop-color="#6CCB4F"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#bg)"/>
  <text x="70" y="145" font-size="54" font-family="Avenir, Poppins, sans-serif" font-weight="700" fill="#F1FDFF">Family Access</text>
  <text x="70" y="198" font-size="30" font-family="Avenir, Poppins, sans-serif" fill="#BEE4ED">Shared accounts for caregivers</text>
  <rect x="60" y="280" width="960" height="220" rx="24" fill="#1A4150"/>
  <text x="95" y="355" font-size="38" font-family="Avenir, Poppins, sans-serif" fill="#EAF8FC">Primary User</text>
  <text x="95" y="410" font-size="34" font-family="Avenir, Poppins, sans-serif" fill="#C8E4EE">Tisya S. (Owner)</text>
  <rect x="60" y="530" width="960" height="260" rx="24" fill="#1D3554"/>
  <text x="95" y="605" font-size="38" font-family="Avenir, Poppins, sans-serif" fill="#EAF1FF">Caregiver 1</text>
  <text x="95" y="660" font-size="34" font-family="Avenir, Poppins, sans-serif" fill="#C4D5EC">Family member (view and alert)</text>
  <rect x="760" y="565" width="190" height="72" rx="36" fill="url(#brand)"/>
  <text x="812" y="612" font-size="30" font-family="Avenir, Poppins, sans-serif" fill="#FFFFFF">Active</text>
  <rect x="60" y="820" width="960" height="96" rx="20" fill="#284D5C"/>
  <text x="95" y="883" font-size="34" font-family="Avenir, Poppins, sans-serif" fill="#E0F1F6">+ Invite family/caregiver</text>
  <text x="70" y="995" font-size="34" font-family="Avenir, Poppins, sans-serif" fill="#DDF0F5">Permissions</text>
  <rect x="60" y="1025" width="960" height="94" rx="20" fill="#1C3B4A"/>
  <text x="95" y="1085" font-size="32" font-family="Avenir, Poppins, sans-serif" fill="#E8F6FB">View medications</text>
  <rect x="910" y="1048" width="80" height="48" rx="24" fill="#6CCB4F"/>
  <rect x="60" y="1140" width="960" height="94" rx="20" fill="#1C3B4A"/>
  <text x="95" y="1200" font-size="32" font-family="Avenir, Poppins, sans-serif" fill="#E8F6FB">Edit reminders</text>
  <rect x="910" y="1163" width="80" height="48" rx="24" fill="#6CCB4F"/>
  <rect x="60" y="1255" width="960" height="94" rx="20" fill="#1C3B4A"/>
  <text x="95" y="1315" font-size="32" font-family="Avenir, Poppins, sans-serif" fill="#E8F6FB">View reports</text>
  <rect x="910" y="1278" width="80" height="48" rx="24" fill="#0E9FBE"/>
  <rect x="95" y="1490" width="890" height="112" rx="56" fill="url(#brand)"/>
  <text x="350" y="1562" font-size="40" font-family="Avenir, Poppins, sans-serif" font-weight="700" fill="#FFFFFF">Save Permissions</text>
</svg>
